name: Deploy to Staging (Homologação - VPS)

on:
  push:
    branches:
      - staging  # Deploy para homologação apenas na branch staging

jobs:
  deploy-staging:
    name: Deploy to Staging (VPS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm ci

      - name: Minificar CSS
        run: npm run minify:css

      - name: Deploy via SSH/RSYNC para VPS (Staging)
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.git' --exclude='node_modules' --exclude='.github'
          path: ./
          remote_path: ${{ secrets.VPS_STAGING_REMOTE_PATH }}
          remote_host: ${{ secrets.VPS_HOST }}
          remote_port: ${{ secrets.VPS_PORT }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}
